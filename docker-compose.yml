services:

  # Ứng dụng web có lỗ hổng — truy cập TRỰC TIẾP để tấn công
  vulnapp:
    build: .
    container_name: vulnapp
    ports:
      - "8081:80"
    volumes:
      - db_data:/var/data
    networks:
      - appnet

  # AI WAF Middleware — Claude-powered classifier (port 8083)
  # Modes: MODE=block (return 403) | MODE=detect (log & forward)
  ai_waf:
    build: ./middleware
    container_name: ai_waf
    ports:
      - "8083:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      MODE: ${WAF_MODE:-block}
      BACKEND_URL: "http://vulnapp:80"
      BLOCK_THRESHOLD: ${BLOCK_THRESHOLD:-70}
    networks:
      - appnet
    depends_on:
      - vulnapp

  # WAF ModSecurity — truy cập QUA ĐÂY để bị chặn 403
  waf:
    image: owasp/modsecurity-crs:nginx
    container_name: modsec_waf
    ports:
      - "8082:8080"
    environment:
      BACKEND: "http://vulnapp:80"
      PORT: "8080"
      MODSEC_RULE_ENGINE: "On"
      PARANOIA: 1
      ANOMALY_INBOUND: 5
    networks:
      - appnet
    depends_on:
      - vulnapp

networks:
  appnet:
    driver: bridge

volumes:
  db_data:
